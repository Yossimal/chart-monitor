apiVersion: v1
kind: ServiceAccount
metadata:
  name: chart-monitor
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chart-monitor-pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chart-monitor-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chart-monitor-pod-reader
subjects:
- kind: ServiceAccount
  name: chart-monitor
  namespace: default
---
apiVersion: v1
kind: Secret
metadata:
  name: chart-monitor-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: chart-monitor
type: kubernetes.io/service-account-token
